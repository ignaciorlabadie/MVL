<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVL - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    #login-page { max-width: 400px; margin: 4rem auto; text-align: center; }
    #login-page h1 { margin-bottom: 2rem; }
    #login-page form { gap: 1rem; }
    #login-error { color: #d32f2f; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
  </style>
</head>
<body>
  <div id="login-page">
    <h1>MVL</h1>
    <form id="login-form">
      <label>Contraseña:
        <input type="password" id="login-password" required autofocus />
      </label>
      <button type="submit">Ingresar</button>
      <div id="login-error">Contraseña incorrecta</div>
    </form>
  </div>
  <script type="module" src="login.ts"></script>
</body>
</html>
